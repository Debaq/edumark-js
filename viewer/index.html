<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edumark Viewer</title>
<script src="../dist/index.global.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Merriweather:wght@400;700&family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ================================================================
   TOKENS
   ================================================================ */
:root {
  --font-ui: 'Inter', -apple-system, system-ui, sans-serif;
  --mono: 'JetBrains Mono', 'Fira Code', monospace;

  /* UI chrome */
  --chrome-bg:    #0a0a0c;
  --chrome-bg-1:  #111114;
  --chrome-bg-2:  #18181c;
  --chrome-border:#222228;
  --chrome-fg:    #e4e4e7;
  --chrome-fg-2:  #a1a1aa;
  --chrome-fg-3:  #71717a;
  --chrome-accent:#818cf8;

  --radius:    12px;
  --radius-sm: 8px;
  --radius-xs: 6px;
}

/* ================================================================
   RESET
   ================================================================ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-ui);background:var(--chrome-bg);color:var(--chrome-fg);height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}

/* ================================================================
   TOPBAR
   ================================================================ */
.topbar{display:flex;align-items:center;gap:12px;padding:7px 14px;background:var(--chrome-bg-1);border-bottom:1px solid var(--chrome-border);flex-shrink:0;z-index:20}
.topbar-logo{font-weight:800;font-size:14px;letter-spacing:-.4px;background:linear-gradient(135deg,#818cf8,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.topbar-sep{width:1px;height:18px;background:var(--chrome-border)}
.topbar-actions{display:flex;gap:6px;margin-left:auto;align-items:center}

select,button{font-family:var(--font-ui);font-size:11px;font-weight:500;background:var(--chrome-bg-2);color:var(--chrome-fg-2);border:1px solid var(--chrome-border);border-radius:var(--radius-xs);padding:4px 10px;cursor:pointer;transition:all .15s}
select:hover,button:hover{border-color:#3f3f46;color:var(--chrome-fg)}
button:active{background:#1e1e22}
.btn-accent{background:var(--chrome-accent);border-color:var(--chrome-accent);color:#fff}
.btn-accent:hover{filter:brightness(1.1);color:#fff}

/* ================================================================
   3-PANEL LAYOUT
   ================================================================ */
.layout{display:flex;flex:1;min-height:0;position:relative}

.panel{display:flex;flex-direction:column;min-width:0;overflow:hidden;transition:flex .35s cubic-bezier(.4,0,.2,1)}
.panel-tab{display:flex;align-items:center;gap:8px;padding:5px 14px;background:var(--chrome-bg-1);border-bottom:1px solid var(--chrome-border);font-size:10px;font-weight:600;color:var(--chrome-fg-3);text-transform:uppercase;letter-spacing:.6px;flex-shrink:0}
.panel-tab .dot{width:5px;height:5px;border-radius:50%;background:#4ade80;flex-shrink:0}
.panel-tab .panel-collapse{margin-left:auto;cursor:pointer;opacity:.4;transition:opacity .15s;background:none;border:none;color:var(--chrome-fg-3);font-size:14px;padding:0 4px}
.panel-tab .panel-collapse:hover{opacity:1}

.gutter{width:1px;background:var(--chrome-border);cursor:col-resize;flex-shrink:0;transition:background .15s,width .15s;z-index:5}
.gutter:hover,.gutter.active{background:var(--chrome-accent);width:3px}

/* Panels sizing */
#source-panel{flex:0 0 30%}
#config-panel{flex:0 0 0%;overflow:hidden;border-left:1px solid var(--chrome-border);border-right:1px solid var(--chrome-border)}
#preview-panel{flex:1 1 auto}

/* Config open state */
.layout.config-open #source-panel{flex:0 0 0%}
.layout.config-open #config-panel{flex:0 0 320px}

/* ================================================================
   EDITOR
   ================================================================ */
#editor{flex:1;width:100%;resize:none;border:none;outline:none;background:var(--chrome-bg);color:var(--chrome-fg);font-family:var(--mono);font-size:12px;line-height:1.7;padding:16px 14px;tab-size:2}

/* ================================================================
   CONFIG PANEL
   ================================================================ */
.config-scroll{flex:1;overflow-y:auto;padding:16px}
.cfg-section{margin-bottom:20px}
.cfg-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--chrome-fg-3);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--chrome-border)}

.cfg-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0}
.cfg-label{font-size:12px;color:var(--chrome-fg-2);font-weight:500}
.cfg-desc{font-size:10px;color:var(--chrome-fg-3);margin-top:1px}

.cfg-select{width:130px}
.cfg-range{width:100px;accent-color:var(--chrome-accent)}
.cfg-range-val{font-size:11px;color:var(--chrome-fg-3);width:32px;text-align:right;font-variant-numeric:tabular-nums}
.cfg-color{display:flex;gap:4px}
.cfg-swatch{width:24px;height:24px;border-radius:6px;border:2px solid transparent;cursor:pointer;transition:all .15s}
.cfg-swatch:hover{transform:scale(1.15)}
.cfg-swatch.active{border-color:#fff;box-shadow:0 0 0 2px var(--chrome-accent)}

.cfg-toggle{position:relative;width:36px;height:20px;background:var(--chrome-border);border-radius:10px;cursor:pointer;transition:background .2s;flex-shrink:0}
.cfg-toggle.on{background:var(--chrome-accent)}
.cfg-toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s}
.cfg-toggle.on::after{transform:translateX(16px)}

/* Theme previews */
.cfg-themes{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px}
.cfg-theme-card{border:2px solid var(--chrome-border);border-radius:var(--radius-sm);padding:10px;cursor:pointer;transition:all .2s;text-align:center}
.cfg-theme-card:hover{border-color:#3f3f46}
.cfg-theme-card.active{border-color:var(--chrome-accent);background:rgba(129,140,248,.06)}
.cfg-theme-preview{height:40px;border-radius:4px;margin-bottom:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;overflow:hidden}
.cfg-theme-name{font-size:11px;font-weight:600;color:var(--chrome-fg)}

/* ================================================================
   PREVIEW WRAPPER
   ================================================================ */
#preview{flex:1;overflow-y:auto}
#preview .edm-content{margin:0 auto;transition:max-width .3s,padding .3s,font-family .3s}

/* ================================================================
   SCROLLBAR
   ================================================================ */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--chrome-border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--chrome-fg-3)}

/* ================================================================
   STATUS BAR
   ================================================================ */
.statusbar{display:flex;align-items:center;gap:14px;padding:3px 14px;font-size:10px;color:var(--chrome-fg-3);background:var(--chrome-bg-1);border-top:1px solid var(--chrome-border);flex-shrink:0}
.statusbar .dot{width:5px;height:5px;border-radius:50%;background:#4ade80;display:inline-block;margin-right:3px}


/* ================================================================
   ================================================================
   THEME SYSTEM — applied to #preview
   ================================================================
   ================================================================ */

/* ---- SHARED CARD STRUCTURE ---- */
.edm-card{border-radius:var(--t-radius,12px);border:1px solid var(--t-border);margin:24px 0;overflow:hidden;transition:border-color .2s,background .2s}
.edm-card:hover{border-color:var(--t-border-hover,var(--t-border))}
.edm-card-header{display:flex;align-items:center;gap:8px;padding:10px 20px;background:var(--t-card-header-bg);border-bottom:1px solid var(--t-border);font-size:12px}
.edm-card-icon{font-size:15px;line-height:1;flex-shrink:0}
.edm-card-label{font-weight:700;text-transform:uppercase;letter-spacing:.4px;font-size:11px}
.edm-card-title{font-weight:600;font-size:14px;color:var(--t-fg);margin-left:auto;text-transform:none;letter-spacing:0}
.edm-card-body{padding:20px 24px}
.edm-card-body>:last-child{margin-bottom:0}
.edm-card-body p{font-size:var(--t-body-size,14px);line-height:var(--t-body-lh,1.75)}
.edm-card-body ul,.edm-card-body ol{font-size:var(--t-body-size,14px)}
.edm-card-body li{font-size:var(--t-body-size,14px);line-height:var(--t-body-lh,1.75);margin:2px 0}
.edm-card-body ul,.edm-card-body ol{padding-left:22px;margin-bottom:12px}

/* ---- HERO ---- */
.edm-hero{border-bottom:1px solid var(--t-border);padding:48px 32px 40px;text-align:center}
.edm-hero-badges{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.edm-hero-badge{font-size:11px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;padding:4px 12px;border-radius:100px}
.edm-hero-title{font-size:var(--t-hero-size,32px);font-weight:800;letter-spacing:-.5px;color:var(--t-fg);margin-bottom:12px;line-height:1.15;font-family:var(--t-heading-font,inherit)}
.edm-hero-meta{display:flex;gap:6px;justify-content:center;align-items:center;color:var(--t-fg-3);font-size:13px}
.edm-hero-sep{color:var(--t-border)}
.edm-hero-topics{margin-top:24px;text-align:left;max-width:540px;margin-left:auto;margin-right:auto}
.edm-hero-topics-label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--t-fg-3);margin-bottom:8px}
.edm-hero-topics ul{list-style:none;display:flex;flex-wrap:wrap;gap:6px}
.edm-hero-topics li{font-size:12px;font-weight:500;padding:4px 12px;border-radius:100px;color:var(--t-fg-2);border:1px solid var(--t-border)}

/* ---- TYPOGRAPHY ---- */
#preview h1{font-size:var(--t-h1-size,28px);font-weight:800;color:var(--t-fg);letter-spacing:-.4px;margin:40px 0 20px;line-height:1.2;padding-bottom:12px;border-bottom:2px solid var(--t-border);font-family:var(--t-heading-font,inherit)}
#preview h2{font-size:var(--t-h2-size,22px);font-weight:700;color:var(--t-fg);letter-spacing:-.3px;margin:48px 0 16px;line-height:1.25;display:flex;align-items:center;gap:10px;font-family:var(--t-heading-font,inherit)}
#preview h2::before{content:'';display:inline-block;width:4px;height:24px;background:var(--t-h2-bar,linear-gradient(180deg,#818cf8,#f472b6));border-radius:2px;flex-shrink:0}
#preview h3{font-size:var(--t-h3-size,17px);font-weight:700;color:var(--t-fg-1);margin:28px 0 10px;font-family:var(--t-heading-font,inherit)}
#preview p{line-height:var(--t-body-lh,1.75);margin:0 0 16px;color:var(--t-fg-1);font-size:var(--t-body-size,15px)}
#preview ul,#preview ol{padding-left:24px;margin:0 0 16px}
#preview li{line-height:var(--t-body-lh,1.75);margin:3px 0;font-size:var(--t-body-size,15px)}
#preview hr{border:none;border-top:1px solid var(--t-border);margin:32px 0}
#preview strong{color:var(--t-fg);font-weight:600}
#preview em{color:var(--t-fg-2)}
#preview a.edm-ref{color:var(--t-accent);text-decoration:none;border-bottom:1px dashed}
#preview a.edm-ref:hover{border-bottom-style:solid}

/* ---- TABLES ---- */
.edm-table-wrap{overflow-x:auto;margin:4px 0}
#preview table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--t-border)}
#preview th{background:var(--t-table-head);padding:10px 14px;text-align:left;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.3px;color:var(--t-fg-2);border-bottom:1px solid var(--t-border)}
#preview td{padding:10px 14px;border-bottom:1px solid var(--t-border);color:var(--t-fg-1)}
#preview tr:last-child td{border-bottom:none}
#preview tr:hover td{background:var(--t-row-hover)}

/* ---- CARD ACCENTS ---- */
.edm-objective .edm-card-header{background:var(--t-accent-soft)}.edm-objective .edm-card-label{color:var(--t-accent)}.edm-objective{border-color:var(--t-accent-border)}
.edm-definition .edm-card-header{background:var(--t-blue-soft)}.edm-definition .edm-card-label{color:var(--t-blue)}.edm-definition{border-color:var(--t-blue-border)}
.edm-key-concept .edm-card-header{background:var(--t-green-soft)}.edm-key-concept .edm-card-label{color:var(--t-green)}.edm-key-concept{border-color:var(--t-green-border)}
.edm-warning .edm-card-header{background:var(--t-red-soft)}.edm-warning .edm-card-label{color:var(--t-red)}.edm-warning{border-color:var(--t-red-border)}
.edm-note .edm-card-header{background:var(--t-muted-soft)}.edm-note .edm-card-label{color:var(--t-fg-3)}.edm-note{border-color:var(--t-border)}
.edm-example .edm-card-header{background:var(--t-green-soft)}.edm-example .edm-card-label{color:var(--t-green)}.edm-example{border-color:var(--t-green-border)}
.edm-exercise .edm-card-header{background:var(--t-orange-soft)}.edm-exercise .edm-card-label{color:var(--t-orange)}.edm-exercise{border-color:var(--t-orange-border)}
.edm-application .edm-card-header{background:var(--t-teal-soft)}.edm-application .edm-card-label{color:var(--t-teal)}.edm-application{border-color:var(--t-teal-border)}
.edm-comparison .edm-card-header{background:var(--t-blue-soft)}.edm-comparison .edm-card-label{color:var(--t-blue)}.edm-comparison{border-color:var(--t-blue-border)}
.edm-diagram .edm-card-header{background:var(--t-accent-soft)}.edm-diagram .edm-card-label{color:var(--t-accent)}.edm-diagram{border-color:var(--t-accent-border)}
.edm-image .edm-card-header{background:var(--t-accent-soft)}.edm-image .edm-card-label{color:var(--t-accent)}.edm-image{border-color:var(--t-accent-border)}
.edm-question .edm-card-header{background:var(--t-yellow-soft)}.edm-question .edm-card-label{color:var(--t-yellow)}.edm-question{border-color:var(--t-yellow-border)}
.edm-mnemonic .edm-card-header{background:var(--t-pink-soft)}.edm-mnemonic .edm-card-label{color:var(--t-pink)}.edm-mnemonic{border-color:var(--t-pink-border)}
.edm-history .edm-card-header{background:var(--t-yellow-soft)}.edm-history .edm-card-label{color:var(--t-yellow)}.edm-history{border-color:var(--t-yellow-border)}
.edm-summary .edm-card-header{background:var(--t-green-soft)}.edm-summary .edm-card-label{color:var(--t-green)}.edm-summary{border-color:var(--t-green-border)}
.edm-reference .edm-card-header{background:var(--t-muted-soft)}.edm-reference .edm-card-label{color:var(--t-fg-3)}.edm-reference{border-color:var(--t-border)}
.edm-aside .edm-card-header{background:var(--t-accent-soft)}.edm-aside .edm-card-label{color:var(--t-accent)}.edm-aside{border-color:var(--t-accent-border)}
.edm-teacher-only{border-style:dashed}.edm-teacher-only .edm-card-header{background:var(--t-red-soft)}.edm-teacher-only .edm-card-label{color:var(--t-red)}.edm-teacher-only{border-color:var(--t-red-border)}
.edm-student-only{border-style:dashed}.edm-student-only .edm-card-header{background:var(--t-blue-soft)}.edm-student-only .edm-card-label{color:var(--t-blue)}.edm-student-only{border-color:var(--t-blue-border)}
.edm-math .edm-card-header{background:var(--t-accent-soft)}.edm-math .edm-card-label{color:var(--t-accent)}.edm-math{border-color:var(--t-accent-border)}

/* ---- DEFINITIONS ---- */
.edm-def-list{list-style:none}
.edm-def-entry{padding:12px 0}.edm-def-entry+.edm-def-entry{border-top:1px solid var(--t-border)}
.edm-def-entry dt{font-weight:700;font-size:15px;color:var(--t-fg);margin-bottom:4px}
.edm-def-entry dd{font-size:14px;color:var(--t-fg-1);line-height:1.7;padding-left:16px;border-left:3px solid var(--t-blue);margin-left:0}

/* ---- SOLUTION ---- */
.edm-solution>summary{cursor:pointer;user-select:none;list-style:none}
.edm-solution>summary::-webkit-details-marker{display:none}
.edm-solution .edm-solution-chevron{margin-left:auto;display:inline-block;width:16px;height:16px;transition:transform .2s}
.edm-solution[open] .edm-solution-chevron{transform:rotate(90deg)}

/* ---- FIGURES ---- */
.edm-fig{margin:0}.edm-fig-frame{background:var(--t-card-header-bg);border-radius:var(--radius-sm);padding:16px;text-align:center;border:1px solid var(--t-border)}
.edm-fig-frame img{max-width:100%;border-radius:4px}
.edm-fig figcaption{margin-top:12px;font-size:13px;line-height:1.6;color:var(--t-fg-2)}
.edm-fig-desc{display:block;margin-top:4px}.edm-fig-source{display:block;margin-top:4px;font-style:italic;color:var(--t-fg-3);font-size:12px}
.edm-diagram-render{text-align:center}.edm-diagram-render pre.mermaid{background:transparent!important}
.edm-diagram-description{font-size:14px;color:var(--t-fg-2);margin-top:12px}
.edm-diagram-fallback{font-size:12px;color:var(--t-fg-3);border-top:1px solid var(--t-border);padding-top:12px;margin-top:16px}

/* ---- QUESTIONS ---- */
.edm-q-type-badge{display:inline-block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;padding:3px 10px;border-radius:100px;background:var(--t-yellow-soft);color:var(--t-yellow);border:1px solid var(--t-yellow-border);margin-bottom:12px}
.edm-q-stem{font-size:15px;line-height:1.7;margin-bottom:16px}.edm-q-stem p{margin-bottom:8px}
.edm-q-options{display:flex;flex-direction:column;gap:6px}
.edm-q-option{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--t-border);cursor:pointer;transition:all .15s;font-size:14px}
.edm-q-option:hover{background:var(--t-row-hover);border-color:var(--t-border-hover,var(--t-border))}
.edm-q-option input{display:none}
.edm-q-letter{width:24px;height:24px;border-radius:50%;background:var(--t-card-header-bg);border:1px solid var(--t-border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--t-fg-2);flex-shrink:0;text-transform:uppercase;transition:all .2s}
.edm-q-text{padding-top:2px;flex:1;line-height:1.6}
.edm-q-option.selected{background:var(--t-accent-soft);border-color:var(--t-accent)}
.edm-q-option.selected .edm-q-letter{background:var(--t-accent);color:#fff;border-color:var(--t-accent)}
.edm-q-option.correct{background:var(--t-green-soft);border-color:var(--t-green)}
.edm-q-option.correct .edm-q-letter{background:var(--t-green);color:#000;border-color:var(--t-green)}
.edm-q-option.wrong{background:var(--t-red-soft);border-color:var(--t-red)}
.edm-q-option.wrong .edm-q-letter{background:var(--t-red);color:#fff;border-color:var(--t-red)}
.edm-q-feedback{font-size:13px;padding:8px 14px 8px 48px;color:var(--t-fg-2);font-style:italic;line-height:1.6;background:var(--t-card-header-bg);border-radius:var(--radius-xs);margin-top:2px}
.edm-q-answer{margin-top:16px}.edm-q-answer summary{cursor:pointer;font-size:13px;font-weight:600;color:var(--t-accent);user-select:none;padding:8px 0}
.edm-q-answer summary:hover{text-decoration:underline}
.edm-q-answer-body{padding:16px;background:var(--t-card-header-bg);border-radius:var(--radius-sm);border:1px solid var(--t-border);margin-top:8px;font-size:14px}

/* ---- HISTORY META ---- */
.edm-hist-meta{display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:var(--t-fg-2);margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--t-border)}
.edm-hist-who,.edm-hist-when{display:flex;align-items:center;gap:4px}

/* ---- MATH ---- */
.edm-math-display{margin:24px 0;text-align:center;font-size:1.15em;overflow-x:auto;padding:16px 0}
.edm-math-inline .katex{font-size:1.05em}
.edm-math-display .katex-display{margin:0}
.edm-math-display .katex-display>.katex{text-align:center}


/* ================================================================
   THEME: DARK (default)
   ================================================================ */
#preview[data-theme="dark"]{
  --t-bg:#09090b;--t-bg-1:#111113;--t-bg-2:#18181b;
  --t-fg:#fafafa;--t-fg-1:#e4e4e7;--t-fg-2:#a1a1aa;--t-fg-3:#71717a;
  --t-border:#27272a;--t-border-hover:#3f3f46;
  --t-card-header-bg:#111113;--t-table-head:#111113;--t-row-hover:#111113;--t-muted-soft:rgba(161,161,170,.06);
  --t-accent:#818cf8;--t-accent-soft:rgba(129,140,248,.10);--t-accent-border:rgba(129,140,248,.3);
  --t-blue:#60a5fa;--t-blue-soft:rgba(96,165,250,.10);--t-blue-border:rgba(96,165,250,.3);
  --t-green:#4ade80;--t-green-soft:rgba(74,222,128,.10);--t-green-border:rgba(74,222,128,.3);

<body>

<div class="topbar">
  <span class="topbar-logo">Edumark</span>
  <span class="topbar-sep"></span>
  <span style="font-size:11px;color:var(--chrome-fg-3)">Viewer</span>
  <div class="topbar-actions">
    <button id="btn-load">Abrir .edm</button>
    <button id="btn-example" class="btn-accent">Cargar ejemplo</button>
  </div>
</div>

<div class="layout" id="layout">
  <!-- SOURCE -->
  <div class="panel" id="source-panel">
    <div class="panel-tab">
      <span class="dot"></span> Fuente .edm
    </div>
    <textarea id="editor" spellcheck="false" placeholder="Escribe o pega contenido .edm aquí..."></textarea>
  </div>

  <div class="gutter" id="gutter1"></div>

  <!-- CONFIG -->
  <div class="panel" id="config-panel">
    <div class="panel-tab">
      <span class="dot"></span> Configuración
    </div>
    <div class="config-scroll">

      <!-- Theme -->
      <div class="cfg-section">
        <div class="cfg-section-title">Tema</div>
        <div class="cfg-themes" id="cfg-themes">
          <div class="cfg-theme-card active" data-theme="dark">
            <div class="cfg-theme-preview" style="background:#09090b;color:#818cf8;border:1px solid #27272a">Aa</div>
            <div class="cfg-theme-name">Oscuro</div>
          </div>
          <div class="cfg-theme-card" data-theme="light">
            <div class="cfg-theme-preview" style="background:#fff;color:#6366f1;border:1px solid #e4e4e7">Aa</div>
            <div class="cfg-theme-name">Claro</div>
          </div>
          <div class="cfg-theme-card" data-theme="sepia">
            <div class="cfg-theme-preview" style="background:#faf6ef;color:#7c5c3a;border:1px solid #ddd5c5">Aa</div>
            <div class="cfg-theme-name">Sepia</div>
          </div>
          <div class="cfg-theme-card" data-theme="amoled">
            <div class="cfg-theme-preview" style="background:#000;color:#a78bfa;border:1px solid #1a1a1a">Aa</div>
            <div class="cfg-theme-name">AMOLED</div>
          </div>
        </div>
      </div>

      <!-- Typography -->
      <div class="cfg-section">
        <div class="cfg-section-title">Tipografía</div>
        <div class="cfg-row">
          <div><div class="cfg-label">Fuente</div></div>
          <select class="cfg-select" id="cfg-font">
            <option value="sans">Sans-serif (Inter)</option>
            <option value="serif">Serif (Source Serif)</option>
            <option value="mixed">Mixta (serif títulos)</option>
          </select>
        </div>
        <div class="cfg-row">
          <div><div class="cfg-label">Tamaño base</div></div>
          <div style="display:flex;align-items:center;gap:6px">
            <input type="range" class="cfg-range" id="cfg-fontsize" min="13" max="20" value="15">
            <span class="cfg-range-val" id="cfg-fontsize-val">15px</span>
          </div>
        </div>
        <div class="cfg-row">
          <div><div class="cfg-label">Interlineado</div></div>
          <div style="display:flex;align-items:center;gap:6px">
            <input type="range" class="cfg-range" id="cfg-lh" min="140" max="220" value="175" step="5">
            <span class="cfg-range-val" id="cfg-lh-val">1.75</span>
          </div>
        </div>
      </div>

      <!-- Layout -->
      <div class="cfg-section">
        <div class="cfg-section-title">Layout</div>
        <div class="cfg-row">
          <div><div class="cfg-label">Ancho contenido</div></div>
          <select class="cfg-select" id="cfg-width">
            <option value="680">Estrecho (680px)</option>
            <option value="780" selected>Normal (780px)</option>
            <option value="920">Ancho (920px)</option>
            <option value="100%">Completo</option>
          </select>
        </div>
        <div class="cfg-row">
          <div><div class="cfg-label">Bordes redondeados</div></div>
          <div style="display:flex;align-items:center;gap:6px">
            <input type="range" class="cfg-range" id="cfg-radius" min="0" max="20" value="12">
            <span class="cfg-range-val" id="cfg-radius-val">12px</span>
          </div>
        </div>
      </div>

      <!-- Content -->
      <div class="cfg-section">
        <div class="cfg-section-title">Contenido</div>
        <div class="cfg-row">
          <div><div class="cfg-label">Modo</div></div>
          <select class="cfg-select" id="cfg-mode">
            <option value="all">Todos</option>
            <option value="student">Estudiante</option>
            <option value="teacher">Docente</option>
          </select>
        </div>
        <div class="cfg-row">
          <div><div class="cfg-label">Iconos de bloque</div></div>
          <div class="cfg-toggle on" id="cfg-icons"></div>
        </div>
        <div class="cfg-row">
          <div><div class="cfg-label">Header de bloque</div></div>
          <div class="cfg-toggle on" id="cfg-headers"></div>
        </div>
      </div>

    </div>
  </div>

  <div class="gutter" id="gutter2"></div>

  <!-- PREVIEW -->
  <div class="panel" id="preview-panel">
    <div class="panel-tab">
      <span class="dot"></span> Vista previa
      <button class="panel-collapse" id="btn-toggle-config" title="Configuración">⚙</button>
    </div>
    <div id="preview" data-theme="dark" data-font="sans"></div>
  </div>
</div>

<div class="statusbar">
  <span><span class="dot"></span>Listo</span>
  <span id="stats"></span>
</div>

<input type="file" id="file-input" accept=".edm,.md,.txt" hidden>

<script>
const editor = document.getElementById('editor')
const preview = document.getElementById('preview')
const layout = document.getElementById('layout')
const stats = document.getElementById('stats')
const fileInput = document.getElementById('file-input')

let debounceTimer = null
let configOpen = false

// ---- RENDER ----
function render() {
  const source = editor.value
  if (!source.trim()) {
    preview.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;opacity:.25;font-size:14px;text-align:center;padding:40px">
      <div><div style="font-size:48px;margin-bottom:12px">📄</div>Escribe o carga un archivo .edm</div></div>`
    stats.textContent = ''
    return
  }
  try {
    const mode = document.getElementById('cfg-mode').value
    const html = Edumark.decode(source, { mode })
    preview.innerHTML = `<div class="edm-content">${html}</div>`
    applyConfig()
    initQuizzes()
    renderMath()
    requestAnimationFrame(() => {
      const m = preview.querySelectorAll('pre.mermaid')
      if (m.length) mermaid.run({ nodes: m })
    })
    const doc = Edumark.parse(source, { mode })
    stats.textContent = `${source.split('\n').length} líneas · ${doc.blocks.length} bloques · ${doc.refs.size} refs`
  } catch (err) {
    preview.innerHTML = `<div style="color:#f87171;padding:32px;font-size:14px"><strong>Error:</strong> ${err.message}</div>`
  }
}

editor.addEventListener('input', () => { clearTimeout(debounceTimer); debounceTimer = setTimeout(render, 250) })

// ---- CONFIG TOGGLE ----
document.getElementById('btn-toggle-config').addEventListener('click', () => {
  configOpen = !configOpen
  layout.classList.toggle('config-open', configOpen)
})

// ---- FILE LOADING ----
document.getElementById('btn-load').addEventListener('click', () => fileInput.click())
fileInput.addEventListener('change', e => {
  const f = e.target.files[0]; if(!f) return
  const r = new FileReader()
  r.onload = ev => { editor.value = ev.target.result; render() }
  r.readAsText(f); fileInput.value = ''
})

document.getElementById('btn-example').addEventListener('click', () => {
  fetch('../test/fixtures/capitulo_ejemplo.edm')
    .then(r => r.ok ? r.text() : Promise.reject())
    .then(t => { editor.value = t; render() })
    .catch(() => { editor.value = FALLBACK; render() })
})

// ---- GUTTER RESIZE ----
function initGutter(gutterEl, leftPanel, rightPanel, layoutEl) {
  let dragging = false
  gutterEl.addEventListener('mousedown', e => { dragging = true; gutterEl.classList.add('active'); e.preventDefault() })
  document.addEventListener('mousemove', e => {
    if (!dragging) return
    const rect = layoutEl.getBoundingClientRect()
    const leftOffset = leftPanel.getBoundingClientRect().left - rect.left
    const pxFromLeft = e.clientX - rect.left - leftOffset
    const leftWidth = Math.max(60, Math.min(rect.width * 0.7, pxFromLeft))
    leftPanel.style.flex = `0 0 ${leftWidth}px`
  })
  document.addEventListener('mouseup', () => { dragging = false; gutterEl.classList.remove('active') })
}
initGutter(document.getElementById('gutter1'), document.getElementById('source-panel'), document.getElementById('config-panel'), layout)
initGutter(document.getElementById('gutter2'), document.getElementById('config-panel'), document.getElementById('preview-panel'), layout)

// ---- CONFIG CONTROLS ----
function applyConfig() {
  const content = preview.querySelector('.edm-content')
  if (!content) return

  // Font size
  const fs = document.getElementById('cfg-fontsize').value
  content.style.setProperty('--t-body-size', fs + 'px')
  content.style.setProperty('--t-h1-size', (parseInt(fs) + 13) + 'px')
  content.style.setProperty('--t-h2-size', (parseInt(fs) + 7) + 'px')
  content.style.setProperty('--t-h3-size', (parseInt(fs) + 2) + 'px')
  content.style.setProperty('--t-hero-size', (parseInt(fs) + 17) + 'px')

  // Line height
  const lh = document.getElementById('cfg-lh').value
  content.style.setProperty('--t-body-lh', (parseInt(lh) / 100).toFixed(2))

  // Width
  const w = document.getElementById('cfg-width').value
  content.style.maxWidth = w === '100%' ? '100%' : w + 'px'
  content.style.padding = '0 32px 80px'

  // Radius
  const r = document.getElementById('cfg-radius').value
  content.style.setProperty('--t-radius', r + 'px')

  // Icons
  const showIcons = document.getElementById('cfg-icons').classList.contains('on')
  content.querySelectorAll('.edm-card-icon').forEach(el => el.style.display = showIcons ? '' : 'none')

  // Headers
  const showHeaders = document.getElementById('cfg-headers').classList.contains('on')
  content.querySelectorAll('.edm-card-header').forEach(el => el.style.display = showHeaders ? '' : 'none')
}

// Theme
document.getElementById('cfg-themes').addEventListener('click', e => {
  const card = e.target.closest('.cfg-theme-card')
  if (!card) return
  document.querySelectorAll('.cfg-theme-card').forEach(c => c.classList.remove('active'))
  card.classList.add('active')
  preview.dataset.theme = card.dataset.theme
  // Re-init mermaid theme
  const isDark = card.dataset.theme !== 'light' && card.dataset.theme !== 'sepia'
  mermaid.initialize({ startOnLoad:false, theme: isDark ? 'dark' : 'default' })
  render()
})

// Font
document.getElementById('cfg-font').addEventListener('change', e => {
  preview.dataset.font = e.target.value
  render()
})

// Font size
document.getElementById('cfg-fontsize').addEventListener('input', e => {
  document.getElementById('cfg-fontsize-val').textContent = e.target.value + 'px'
  applyConfig()
})

// Line height
document.getElementById('cfg-lh').addEventListener('input', e => {
  document.getElementById('cfg-lh-val').textContent = (parseInt(e.target.value) / 100).toFixed(2)
  applyConfig()
})

// Width
document.getElementById('cfg-width').addEventListener('change', () => applyConfig())

// Radius
document.getElementById('cfg-radius').addEventListener('input', e => {
  document.getElementById('cfg-radius-val').textContent = e.target.value + 'px'
  applyConfig()
})

// Mode
document.getElementById('cfg-mode').addEventListener('change', () => render())

// Toggles
document.querySelectorAll('.cfg-toggle').forEach(toggle => {
  toggle.addEventListener('click', () => {
    toggle.classList.toggle('on')
    applyConfig()
  })
})

// ---- QUIZZES ----
function renderMath() {
  if (typeof katex === 'undefined') return
  preview.querySelectorAll('.edm-math-inline').forEach(el => {
    const tex = el.getAttribute('data-math')
    if (!tex) return
    try {
      katex.render(tex, el, { throwOnError: false, displayMode: false })
    } catch {}
  })
  preview.querySelectorAll('.edm-math-display').forEach(el => {
    const tex = el.getAttribute('data-math')
    if (!tex) return
    try {
      katex.render(tex, el, { throwOnError: false, displayMode: true })
    } catch {}
  })
}

function initQuizzes() {
  preview.querySelectorAll('.edm-q-option').forEach(label => {
    label.addEventListener('click', () => {
      const card = label.closest('.edm-card')
      const opts = card.querySelectorAll('.edm-q-option')
      const input = label.querySelector('input')
      const isRadio = input?.type === 'radio'
      if (isRadio) {
        opts.forEach(o => o.classList.remove('selected','correct','wrong'))
        card.querySelectorAll('.edm-q-feedback').forEach(f => f.hidden = true)
      }
      if (input) input.checked = true
      label.classList.add('selected')
      const ok = label.dataset.correct === 'true'
      label.classList.add(ok ? 'correct' : 'wrong')
      if (!ok && isRadio) opts.forEach(o => { if (o.dataset.correct === 'true') o.classList.add('correct') })
      const fb = label.nextElementSibling
      if (fb && fb.classList.contains('edm-q-feedback')) fb.hidden = false
    })
  })
}
